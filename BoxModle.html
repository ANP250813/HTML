<!DOCTYPE html>
<html>
    <title>
        Box Modle
    </title>
<head>
<style>
.box-modle-example {
    width: 300px;
    height: 150px;
    
    background-color: yellow;
    
    border: 15px solid blue;
    
    padding: 20px;
    
    margin: 40px;

    text-align: center;

  }
.box-2{
       width: 200px;
    height: 100px;
    
    background-color: rgb(21, 255, 0);
    
    border: 15px solid rgb(238, 255, 0);
    
    padding: 25px;
    
    margin: 50px;

}

</style>
</head>
<body>
  <div class="box-modle-example">
Yellow Box
</div>
  <div class="box-2">
   Green Box
  </div>
</body>
</html>
