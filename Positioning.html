<!DOCTYPE html>
<html>
<head>
<style>
div.relative {
    position: relative;
    left: 30px;
    border: 3px solid #0040ff;
}

div.fixed {
    position: fixed;
    left: 30px;
    border: 3px solid #0040ff;; 
}

div.absolute {
    position: absolute;
    left: 30px;
    border: 3px solid #0040ff;;
}

div.static {
    position: static;
    left: 30px;
    border: 3px solid #0040ff;; 
}
</style>
</head>
<body>
<h2>positions</h2>

<div class="relative">

This is relative

</div><br>

<div class="fixed">

This is fixed

</div><br><br>

<div class="absolute">

This is absolute
</div><br><br>

<div class="static">
    
This is static
</div>

</body>

</html>
