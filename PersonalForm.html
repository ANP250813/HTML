<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Form</title>
</head>
<body>
    <h2>Personal Information</h2>
    <form onsubmit="event.preventDefault(); alert('Form submitted');">
        <div class="form-group"><label>Name:</label><input type="text" name="name"></div><br>
        <div class="form-group"><label>DOB:</label><input type="date" name="dob"></div><br>
        <div class="form-group"><label>Email:</label><input type="email" name="email"></div><br>
        <div class="form-group"><label>Phone:</label><input type="text" name="phone"></div><br>
        <div class="form-group"><label>Gender:</label><input type="radio" name="gender" value="male"> M <input type="radio" name="gender" value="female"> F</div><br>
        <button type="submit" class="btn">Submit</button>
    </form>
</body>
</html>
